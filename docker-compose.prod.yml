services:
  app:
    image: "${HL6_IMAGE:-ghcr.io/hanlull/hl6:latest}"
    container_name: hl6-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      APP_URL: "${APP_URL:-}"
      FRONTEND_URL: "${FRONTEND_URL:-}"
      BACKEND_URL: "${BACKEND_URL:-}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      SESSION_SECRET: "${SESSION_SECRET:-}"
      AUTH_PASSWORD_PEPPER_ID: "${AUTH_PASSWORD_PEPPER_ID:-v1}"
      AUTH_PASSWORD_PEPPER: "${AUTH_PASSWORD_PEPPER:-}"
      AUTH_PREVIOUS_PASSWORD_PEPPER_ID: "${AUTH_PREVIOUS_PASSWORD_PEPPER_ID:-}"
      AUTH_PREVIOUS_PASSWORD_PEPPER: "${AUTH_PREVIOUS_PASSWORD_PEPPER:-}"
      SMTP_BOOTSTRAP_HOST: "${SMTP_BOOTSTRAP_HOST:-}"
      SMTP_BOOTSTRAP_PORT: "${SMTP_BOOTSTRAP_PORT:-587}"
      SMTP_BOOTSTRAP_USERNAME: "${SMTP_BOOTSTRAP_USERNAME:-}"
      SMTP_BOOTSTRAP_PASSWORD: "${SMTP_BOOTSTRAP_PASSWORD:-}"
      SMTP_BOOTSTRAP_FROM_NAME: "${SMTP_BOOTSTRAP_FROM_NAME:-HL6}"
      SMTP_BOOTSTRAP_FROM_ADDR: "${SMTP_BOOTSTRAP_FROM_ADDR:-}"
      SMTP_BOOTSTRAP_USE_TLS: "${SMTP_BOOTSTRAP_USE_TLS:-true}"
      SMTP_BOOTSTRAP_ENABLED: "${SMTP_BOOTSTRAP_ENABLED:-false}"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-}"
      REDIS_ADDR: "${REDIS_ADDR:-}"
      MAINTENANCE_DATA_DIR: "/var/lib/hl6/maintenance"
    volumes:
      - maintenance-data:/var/lib/hl6/maintenance
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: "${POSTGRES_IMAGE:-postgres:16-alpine}"
    container_name: hl6-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  maintenance-data:
