services:
  postgres:
    image: postgres:16-alpine
    container_name: hl6-postgres
    environment:
      POSTGRES_DB: hl6
      POSTGRES_USER: hl6
      POSTGRES_PASSWORD: hl6dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hl6"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
