name: Build Web Android Client

on:
  workflow_dispatch:
    inputs:
      communication_domain:
        description: HTTPS backend domain, for example hl6.example.com
        required: true
        type: string
      communication_key:
        description: Global client communication key generated in HL6 Admin Settings
        required: true
        type: string
      client_name:
        description: Android application display name
        required: true
        type: string
      client_icon:
        description: Optional HTTPS PNG/WebP URL or repository-relative PNG/WebP icon path
        required: false
        type: string
      version:
        description: Android versionName, for example 1.0.0
        required: true
        type: string
      android_package_name:
        description: Lowercase Android applicationId, for example cloud.houlang.hl6
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CLIENT_COMMUNICATION_DOMAIN: ${{ inputs.communication_domain }}
      CLIENT_COMMUNICATION_KEY: ${{ inputs.communication_key }}
      CLIENT_DISPLAY_NAME: ${{ inputs.client_name }}
      CLIENT_ICON_PATH: ${{ inputs.client_icon }}
      CLIENT_VERSION_NAME: ${{ inputs.version }}
      CLIENT_APPLICATION_ID: ${{ inputs.android_package_name }}
      CLIENT_KEYSTORE_FILE: release.keystore
      CLIENT_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      CLIENT_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      CLIENT_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Validate required build configuration
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          for sensitive_value in CLIENT_COMMUNICATION_KEY CLIENT_KEYSTORE_PASSWORD CLIENT_KEY_PASSWORD ANDROID_KEYSTORE_BASE64; do
            if [ -n "${!sensitive_value:-}" ]; then
              echo "::add-mask::${!sensitive_value}"
            fi
          done

          missing=()
          for value in CLIENT_COMMUNICATION_DOMAIN CLIENT_COMMUNICATION_KEY CLIENT_DISPLAY_NAME CLIENT_VERSION_NAME CLIENT_APPLICATION_ID CLIENT_KEYSTORE_PASSWORD CLIENT_KEY_ALIAS CLIENT_KEY_PASSWORD ANDROID_KEYSTORE_BASE64; do
            if [ -z "${!value:-}" ]; then
              missing+=("$value")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            {
              echo "## Android web-client build configuration is incomplete"
              echo
              echo "The following workflow inputs or GitHub Actions secrets are missing:"
              for value in "${missing[@]}"; do
                printf '%s\n' "- \`$value\`"
              done
              echo
              echo "Configure the four Android signing secrets in Settings > Secrets and variables > Actions before rerunning: \`ANDROID_KEYSTORE_BASE64\`, \`ANDROID_KEYSTORE_PASSWORD\`, \`ANDROID_KEY_ALIAS\`, and \`ANDROID_KEY_PASSWORD\`."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error title=Missing Android build configuration::Configure the missing workflow inputs or GitHub Actions secrets."
            exit 1
          fi

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Prepare web build environment
        run: |
          set -euo pipefail
          node <<'NODE'
          const rawDomain = process.env.CLIENT_COMMUNICATION_DOMAIN.trim();
          const source = /^https:\/\//i.test(rawDomain) ? rawDomain : `https://${rawDomain}`;
          const url = new URL(source);
          if (url.protocol !== "https:" || url.username || url.password || url.pathname !== "/" || url.search || url.hash) {
            throw new Error("CLIENT_COMMUNICATION_DOMAIN must be an HTTPS domain without a path, credentials, query, or fragment.");
          }
          const version = process.env.CLIENT_VERSION_NAME.trim();
          if (!/^(?:0|[1-9][0-9]{0,2})\.(?:0|[1-9][0-9]{0,2})\.(?:0|[1-9][0-9]{0,2})$/.test(version)) {
            throw new Error("CLIENT_VERSION_NAME must use major.minor.patch semantic versioning.");
          }
          const applicationId = process.env.CLIENT_APPLICATION_ID.trim();
          if (!/^[a-z][a-z0-9]*(\.[a-z][a-z0-9]*)+$/.test(applicationId) || applicationId.length > 60) {
            throw new Error("CLIENT_APPLICATION_ID must be a lowercase Android package name of at most 60 characters and compatible with the native OIDC redirect scheme.");
          }
          const key = process.env.CLIENT_COMMUNICATION_KEY.trim();
          if (!/^[A-Za-z0-9_-]{43}$/.test(key)) {
            throw new Error("CLIENT_COMMUNICATION_KEY must be a 32-byte URL-safe key generated by HL6.");
          }
          const output = [
            "VITE_CAPACITOR_APP=true",
            `VITE_API_BASE_URL=${url.origin}/api/v1`,
            `VITE_CLIENT_COMMUNICATION_KEY=${key}`,
            `VITE_CLIENT_VERSION=${version}`,
            `VITE_NATIVE_REDIRECT_URI=hl6.${applicationId}://auth/callback`,
          ];
          require("node:fs").appendFileSync(process.env.GITHUB_ENV, `${output.join("\n")}\n`);
          NODE

      - name: Build the existing web UI
        run: pnpm run build
        working-directory: web

      - name: Synchronize the web UI into Android
        run: ./node_modules/.bin/cap sync android
        working-directory: web

      - name: Prepare Android release configuration
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          if ! printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > web/android/release.keystore; then
            echo "::error title=Invalid Android keystore::ANDROID_KEYSTORE_BASE64 is not valid Base64."
            exit 1
          fi

          if ! keystore_metadata="$(keytool -list -v -keystore web/android/release.keystore -storepass "$CLIENT_KEYSTORE_PASSWORD" 2>&1)"; then
            echo "::error title=Invalid Android keystore configuration::Check ANDROID_KEYSTORE_BASE64 and ANDROID_KEYSTORE_PASSWORD."
            exit 1
          fi

          keystore_type="$(printf '%s\n' "$keystore_metadata" | awk -F ': ' '/^Keystore type: / { print $2; exit }')"
          mapfile -t private_key_aliases < <(
            printf '%s\n' "$keystore_metadata" | awk -F ': ' '
              /^Alias name: / { alias = $2 }
              /^Entry type: PrivateKeyEntry$/ && alias != "" { print alias }
            '
          )

          if [ -z "$keystore_type" ] || [ "${#private_key_aliases[@]}" -ne 1 ]; then
            echo "::error title=Unsupported Android keystore::The release keystore must contain exactly one private-key entry."
            exit 1
          fi

          detected_key_alias="${private_key_aliases[0]}"
          if [ "$CLIENT_KEY_ALIAS" != "$detected_key_alias" ]; then
            echo "::warning title=Android signing alias normalized::The configured alias did not match the only private-key entry, so the detected alias will be used."
          fi

          export CLIENT_KEY_ALIAS="$detected_key_alias"
          export CLIENT_KEYSTORE_TYPE="$keystore_type"
          node web/scripts/configure-capacitor-build.mjs
          {
            printf 'HL6_KEYSTORE_TYPE=%s\n' "$CLIENT_KEYSTORE_TYPE"
            printf 'HL6_KEY_ALIAS=%s\n' "$CLIENT_KEY_ALIAS"
          } >> "$GITHUB_ENV"

      - name: Build signed release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace \
            -PHL6_KEYSTORE_FILE=release.keystore \
            -PHL6_KEYSTORE_PASSWORD="$CLIENT_KEYSTORE_PASSWORD" \
            -PHL6_KEYSTORE_TYPE="$HL6_KEYSTORE_TYPE" \
            -PHL6_KEY_ALIAS="$HL6_KEY_ALIAS" \
            -PHL6_KEY_PASSWORD="$CLIENT_KEY_PASSWORD"
        working-directory: web/android

      - name: Verify APK signature
        run: |
          BUILD_TOOLS="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)"
          "$BUILD_TOOLS/apksigner" verify --verbose web/android/app/build/outputs/apk/release/app-release.apk

      - name: Report verified APK
        run: |
          {
            echo "## Android APK verified"
            echo
            echo "The signed APK was built and verified on the runner. This workflow does not create a GitHub Release or publish an APK without an explicitly configured distribution channel."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean generated signing material
        if: always()
        run: |
          rm -f web/android/release.keystore
          rm -f web/android/hl6-client-build.properties
          rm -f web/android/app/src/main/res/drawable/hl6_client_icon.png
          rm -f web/android/app/src/main/res/values/hl6_client.xml
          rm -rf web/dist
