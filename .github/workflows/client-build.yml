name: Build Native Android Client

on:
  workflow_dispatch:
    inputs:
      communication_domain:
        description: HTTPS backend domain, for example hl6.example.com
        required: true
        type: string
      communication_key:
        description: Global client communication key generated in HL6 Admin Settings
        required: true
        type: string
      client_name:
        description: Native application display name
        required: true
        type: string
      client_icon:
        description: Optional repository-relative PNG icon path
        required: false
        type: string
      version:
        description: Android versionName, for example 1.0.0
        required: true
        type: string
      android_package_name:
        description: Lowercase Android applicationId, for example cloud.houlang.hl6
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLIENT_COMMUNICATION_DOMAIN: ${{ inputs.communication_domain }}
      CLIENT_COMMUNICATION_KEY: ${{ inputs.communication_key }}
      CLIENT_DISPLAY_NAME: ${{ inputs.client_name }}
      CLIENT_ICON_PATH: ${{ inputs.client_icon }}
      CLIENT_VERSION_NAME: ${{ inputs.version }}
      CLIENT_APPLICATION_ID: ${{ inputs.android_package_name }}
      CLIENT_KEYSTORE_FILE: release.keystore
      CLIENT_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      CLIENT_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      CLIENT_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Validate required build configuration
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "::add-mask::$CLIENT_COMMUNICATION_KEY"
          for value in CLIENT_COMMUNICATION_DOMAIN CLIENT_COMMUNICATION_KEY CLIENT_DISPLAY_NAME CLIENT_VERSION_NAME CLIENT_APPLICATION_ID CLIENT_KEYSTORE_PASSWORD CLIENT_KEY_ALIAS CLIENT_KEY_PASSWORD ANDROID_KEYSTORE_BASE64; do
            if [ -z "${!value:-}" ]; then
              echo "::error::Missing required client build configuration: $value"
              exit 1
            fi
          done

      - name: Prepare native release configuration
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > client/release.keystore
          node client/scripts/configure-build.mjs

      - name: Build signed release APK
        run: gradle -p client :app:assembleRelease --no-daemon --stacktrace

      - name: Verify APK signature
        run: |
          BUILD_TOOLS="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)"
          "$BUILD_TOOLS/apksigner" verify --verbose client/app/build/outputs/apk/release/app-release.apk

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.client_name }}-${{ inputs.version }}-android-release
          path: client/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
