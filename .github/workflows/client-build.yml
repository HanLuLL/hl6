name: Build Android Client

on:
  workflow_dispatch:
    inputs:
      communication_domain:
        description: HTTPS domain serving HL6, without /api/v1
        required: true
        type: string
      communication_key:
        description: Communication key generated by Admin Settings
        required: true
        type: string
      client_name:
        description: Android application name
        required: true
        default: HL6
        type: string
      client_icon:
        description: Optional repository path to a PNG icon
        required: false
        type: string
      version:
        description: Client version, for example 1.0.0
        required: true
        type: string
      android_package_name:
        description: Android package name, for example cloud.houlang.hl6
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: https://${{ inputs.communication_domain }}/api/v1
      VITE_CLIENT_COMMUNICATION_KEY: ${{ inputs.communication_key }}
      VITE_CLIENT_BUILD_VERSION: ${{ inputs.version }}
      CLIENT_APP_NAME: ${{ inputs.client_name }}
      CLIENT_APP_ID: ${{ inputs.android_package_name }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: |
          npm ci --prefix web
          npm install --prefix client

      - name: Build embedded web UI
        run: npm run build --prefix web

      - name: Prepare Android project
        run: |
          npm exec --prefix client -- cap add android
          npm run sync:android --prefix client
          node client/scripts/configure-android-version.mjs

      - name: Apply optional icon
        if: ${{ inputs.client_icon != '' }}
        run: |
          test -f "${{ inputs.client_icon }}"
          mkdir -p client/assets
          cp "${{ inputs.client_icon }}" client/assets/icon.png
          npm exec --prefix client -- capacitor-assets generate --android

      - name: Build release APK
        run: cd client/android && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.client_name }}-${{ inputs.version }}-android
          path: client/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
